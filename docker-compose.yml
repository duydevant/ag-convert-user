
services:
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: keycloak-auth0-migration
    command: start-dev
    environment:
      # Keycloak admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      # Database (use dev-file for simplicity, or PostgreSQL for production)
      KC_DB: dev-file
      # HTTP
      KC_HTTP_PORT: 9016
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "9016:9016"
    volumes:
      # Persist data
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

volumes:
  keycloak_data:
