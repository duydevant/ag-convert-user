services:
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: keycloak-auth0-migration
    command: start-dev
    environment:
      # Keycloak admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      # Database (use dev-file for simplicity, or PostgreSQL for production)
      KC_DB: dev-file
      # HTTP
      KC_HTTP_PORT: 9016
      KC_HTTP_ENABLED: 'true'
      # Hostname — public domain qua reverse proxy (Nginx)
      # KC_HOSTNAME: teacher.quizonline.website
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: 'true'
      # Proxy — trust X-Forwarded-* headers from Nginx
      KC_PROXY_HEADERS: xforwarded
    ports:
      - '9016:9016'
    volumes:
      # Persist data
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: convert-user-backend
    env_file:
      - .env
    ports:
      - '${PORT:-9015}:${PORT:-9015}'
    depends_on:
      - keycloak
    restart: unless-stopped

volumes:
  keycloak_data:
