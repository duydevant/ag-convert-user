services:
  postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: keycloak-auth0-migration
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: ${KC_DB}
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HTTP_PORT: ${KC_HTTP_PORT}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: ${KC_HOSTNAME_BACKCHANNEL_DYNAMIC}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS}
    ports:
      - '${KC_HTTP_PORT:-9016}:${KC_HTTP_PORT:-9016}'
    depends_on:
      - postgres
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: convert-user-backend
    mem_limit: 2g
    env_file:
      - .env
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:${KC_HTTP_PORT:-9016}
      KEYCLOAK_PUBLIC_URL: http://localhost:${KC_HTTP_PORT:-9016}
    ports:
      - '${PORT:-9015}:${PORT:-9015}'
    depends_on:
      - keycloak
    restart: unless-stopped

volumes:
  postgres_data:
